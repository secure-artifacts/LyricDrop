name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Archive (ad-hoc signed)
        run: |
          mkdir -p build
          xcodebuild \
            -project LyricDrop.xcodeproj \
            -scheme LyricDrop \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/LyricDrop.xcarchive \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM= \
            archive

      - name: Verify signature
        run: codesign -dv build/LyricDrop.xcarchive/Products/Applications/LyricDrop.app 2>&1 || true

      - name: Package DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          STAGE=build/dmg-stage
          mkdir -p "$STAGE"
          cp -R build/LyricDrop.xcarchive/Products/Applications/LyricDrop.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "LyricDrop" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "build/LyricDrop-${VERSION}.dmg"
          ls -la "build/LyricDrop-${VERSION}.dmg"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/LyricDrop-*.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES_FILE=release_notes.md
          if [ ! -f "$NOTES_FILE" ]; then
            echo "# LyricDrop ${VERSION}" > "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "Auto-generated release from tag ${GITHUB_REF_NAME}." >> "$NOTES_FILE"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "LyricDrop ${VERSION}" \
            --notes-file "$NOTES_FILE" \
            "build/LyricDrop-${VERSION}.dmg"
